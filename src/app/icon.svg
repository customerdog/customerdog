<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- customerdog favicon
       Rounded-square brand-color background + white dog face.
       rx=22 (22%) matches iOS app-icon proportions for visual harmony
       on platforms that don't auto-round (browser tabs, Android, etc.). -->
  <rect width="100" height="100" rx="22" fill="#dc2626"/>

  <!-- Floppy ears (drawn behind the head, hanging down on either side) -->
  <path d="M 22 30 C 16 30, 14 42, 20 54 C 24 60, 30 60, 32 52 L 32 36 Z"
        fill="#ffffff"/>
  <path d="M 78 30 C 84 30, 86 42, 80 54 C 76 60, 70 60, 68 52 L 68 36 Z"
        fill="#ffffff"/>

  <!-- Head -->
  <ellipse cx="50" cy="58" rx="24" ry="22" fill="#ffffff"/>

  <!-- Eyes -->
  <circle cx="41" cy="54" r="4" fill="#1f1f1f"/>
  <circle cx="59" cy="54" r="4" fill="#1f1f1f"/>

  <!-- Snout (lighter pink so it reads against the white face) -->
  <ellipse cx="50" cy="68" rx="11" ry="8" fill="#fde2e2"/>

  <!-- Nose -->
  <ellipse cx="50" cy="64" rx="4" ry="3" fill="#1f1f1f"/>

  <!-- Smile -->
  <path d="M 44 71 Q 50 76, 56 71"
        stroke="#1f1f1f" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
